stages:
  - build
  - test
  - docker_build
  - docker_push
  - deploy
  - integration_test

variables:
  AWS_REGION: "ap-south-1"
  CLUSTER_NAME: "prod-eks-cluster"
  IMAGE_NAME: "java-app"
  IMAGE_TAG: "$CI_PIPELINE_ID-$CI_ENVIRONMENT_NAME"

# ========================
# BUILD (ONLY COMPILE + PACKAGE)
# ========================
build:
  stage: build
  image: maven:3.9-eclipse-temurin-17
  script:
    - mvn clean package -DskipTests
  artifacts:
    paths:
      - target/*.jar

# ========================
# TEST (ALL QUALITY CHECKS)
# ========================
test:
  stage: test
  image: maven:3.9-eclipse-temurin-17
  script:
    # Unit Tests
    - mvn test

    # Lint (Checkstyle / SpotBugs)
    - mvn checkstyle:check || true
    - mvn spotbugs:check || true

    # SonarQube
    - mvn sonar:sonar
      -Dsonar.projectKey=java-app
      -Dsonar.host.url=$SONAR_HOST_URL
      -Dsonar.login=$SONAR_TOKEN

    # Checkmarx (SAST)
    - echo "Running Checkmarx Scan..."
    - cx scan create --project-name "java-app" --branch "$CI_COMMIT_REF_NAME" || true

  dependencies:
    - build

# ========================
# DOCKER BUILD
# ========================
docker_build:
  stage: docker_build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .

# ========================
# DOCKER PUSH (ECR)
# ========================
docker_push:
  stage: docker_push
  image: amazon/aws-cli
  services:
    - docker:24-dind
  script:
    - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - ECR_REPO=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME

    - aws ecr describe-repositories --repository-names $IMAGE_NAME || \
      aws ecr create-repository --repository-name $IMAGE_NAME

    - aws ecr get-login-password --region $AWS_REGION |
      docker login --username AWS --password-stdin $ECR_REPO

    - docker tag $IMAGE_NAME:$IMAGE_TAG $ECR_REPO:$IMAGE_TAG
    - docker push $ECR_REPO:$IMAGE_TAG

# ========================
# DEPLOY (HELM)
# ========================
deploy:
  stage: deploy
  image: alpine/helm:3.14.0
  script:
    - apk add --no-cache curl bash python3 py3-pip
    - pip install awscli

    - export ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
    - export ECR_REPO=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$IMAGE_NAME

    - aws eks update-kubeconfig --name $CLUSTER_NAME --region $AWS_REGION

    - helm upgrade --install java-app ./helm/java-app \
        --set image.repository=$ECR_REPO \
        --set image.tag=$IMAGE_TAG \
        --namespace $CI_ENVIRONMENT_NAME \
        --create-namespace

    - kubectl rollout status deployment/java-app -n $CI_ENVIRONMENT_NAME

  environment:
    name: $CI_COMMIT_REF_NAME

# ========================
# INTEGRATION TEST
# ========================
integration_test:
  stage: integration_test
  image: curlimages/curl:latest
  script:
    - echo "Running integration test..."

    - APP_URL=$(kubectl get svc java-app-service -n $CI_ENVIRONMENT_NAME \
      -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')

    - sleep 40

    - curl -f http://$APP_URL/actuator/health